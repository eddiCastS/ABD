
server:
  port: 8080
  servlet:
    context-path: /api
spring:
  application:
    name: estudiantes-service

  datasource:
    url: jdbc:postgresql://localhost:5432/estudiantes_db
    username: postgres                #
    password: 1234
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


logging:
  level:
    mx.edu.universidad: DEBUG
    org.hibernate.SQL: DEBUG